<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarjeta de Perfil</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="card">
      <img
        class="card__avatar"
        src="./assets/images/gengar.gif"
        alt="Avatar del usuario"
      />
      <h2 class="card__name">Gamaliel Camey</h2>
      <p class="card__role">Desarrollador Frontend</p>
      <p class="card__bio">
        Apasionado por crear interfaces accesibles y responsivas. Especializado
        en CSS moderno y JavaScript.
      </p>
      <div class="card__stats">
        <div class="stat">
          <span class="stat__value">127</span>
          <span class="stat__label">Proyectos</span>
        </div>
        <div class="stat">
          <span class="stat__value">2.4k</span>
          <span class="stat__label">Seguidores</span>
        </div>
        <div class="stat">
          <span class="stat__value">89</span>
          <span class="stat__label">Siguiendo</span>
        </div>
      </div>
      <div class="card__actions">
        <button class="btn btn--primary">Seguir</button>
        <button class="btn btn--secondary">Mensaje</button>
      </div>
    </div>
  </body>
</html>
